variables:
  VERSION: 1.5.${CI_PIPELINE_ID}
  NODE_ENV: production
  ENABLE_RATING_SYSTEM: "true"
  ENABLE_SOCIAL_SHARING: "true"

stages:
  - build
  - release
  - deploy
  - rollback

build_backend:
  stage: build
  image: node:18-alpine
  variables:
    NODE_ENV: development
  script:
    - npm ci
    - npm run build
    - tar -czvf burger-market_${VERSION}.tar.gz dist/ package.json package-lock.json drizzle.config.ts shared/schema.ts
  artifacts:
    paths:
      - burger-market_${VERSION}.tar.gz

release_backend:
  stage: release
  image: alpine:latest
  needs: ["build_backend"]
  script:
    - apk add --no-cache curl
    - curl -u "${NEXUS_LOGIN}:${NEXUS_PASS}" -v -X PUT -T burger-market_${VERSION}.tar.gz ${NEXUS_URL}/${NEXUS_REPO}/burger-market_${VERSION}.tar.gz

deploy:
  stage: deploy
  image: alpine:latest
  needs: ["release_backend"]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "echo 'SSH works!' && sudo mkdir -p /${SSH_USER}/burger-market && sudo chown ${SSH_USER}:${SSH_USER} /${SSH_USER}/burger-market"
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ./burger-market.service  ${SSH_USER}@${SSH_HOST}:/${SSH_USER}/burger-market/burger-market.service
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ./deploy.sh ${SSH_USER}@${SSH_HOST}:/${SSH_USER}/burger-market/deploy.sh
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "chmod +x /${SSH_USER}/burger-market/deploy.sh"
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "
      export VERSION='${VERSION}';
      export NEXUS_URL='${NEXUS_URL}';
      export NEXUS_LOGIN='${NEXUS_LOGIN}';
      export NEXUS_PASS='${NEXUS_PASS}';
      export NEXUS_REPO='${NEXUS_REPO}';
      export ENABLE_RATING_SYSTEM='${ENABLE_RATING_SYSTEM}';
      export ENABLE_SOCIAL_SHARING='${ENABLE_SOCIAL_SHARING}';
      export DATABASE_URL='${DATABASE_URL}';
      /${SSH_USER}/burger-market/deploy.sh
      "
  when: manual

manual_rollback:
  stage: rollback
  variables:
    ROLLBACK_VERSION: "previous"
  when: manual
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "echo 'SSH works!' && sudo mkdir -p /${SSH_USER}/burger-market && sudo chown ${SSH_USER}:${SSH_USER} /${SSH_USER}/burger-market"
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ./burger-market.service  ${SSH_USER}@${SSH_HOST}:/${SSH_USER}/burger-market/burger-market.service
    - scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ./deploy.sh ${SSH_USER}@${SSH_HOST}:/${SSH_USER}/burger-market/deploy.sh
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "chmod +x /${SSH_USER}/burger-market/deploy.sh"
    - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "
      export VERSION='${ROLLBACK_VERSION}';
      export NEXUS_URL='${NEXUS_URL}';
      export NEXUS_LOGIN='${NEXUS_LOGIN}';
      export NEXUS_PASS='${NEXUS_PASS}';
      export NEXUS_REPO='${NEXUS_REPO}';
      export ENABLE_RATING_SYSTEM='${ENABLE_RATING_SYSTEM}';
      export ENABLE_SOCIAL_SHARING='${ENABLE_SOCIAL_SHARING}';
      export DATABASE_URL='${DATABASE_URL}';
      /${SSH_USER}/burger-market/deploy.sh
      "
